    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        
        <input type="hidden" name="access_key" value="78ed1c9e-5fd1-4249-9cde-a81770ac4224">

        <div class="input-box">
            <input type="text" name="name" placeholder="Full Name" required>

        </div>
        
        <div class="input-box">
            <input type="number" name="phone" placeholder="Mobile Number">
            <input type="text" name="subject" placeholder="Email Subject" required>
        </div>
        
        <textarea name="message" cols="30" rows="8" placeholder="Your Message" required></textarea>

        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

        <button type="submit" class="btn">Send Message</button>
    </form>
